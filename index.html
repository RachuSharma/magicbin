<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <!-- ✅ Required for mobile scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Waste Guide</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow: hidden; /* prevents double scrolling on mobile */
    }

    .topbar {
      background: #2e7d32;
      color: white;
      padding: 12px;
      font-size: 18px;
      font-weight: bold;
    }

    iframe {
      border: none;
      width: 100%;
      height: calc(100vh - 50px); /* full screen minus header */
    }

    /* 📱 Mobile tweaks */
    @media (max-width: 600px) {
      .topbar {
        font-size: 16px;
        padding: 10px;
      }

      iframe {
        height: calc(100vh - 45px);
      }
    }
  </style>
</head>

<body>

<div class="topbar">♻️ Waste Sorting Guide</div>

<!-- 🔧 Improved PDF rendering settings -->
<iframe 
  src="wastesortingguide2024.pdf#toolbar=0&navpanes=0&scrollbar=0&view=FitH&zoom=page-width">
</iframe>

</body>
</html>
