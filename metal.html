<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metal – Waste Sorting Guide</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500&display=swap');
  :root { --color: #7b3f00; --light: #fdf1e8; --accent: #e67e22; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--light); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 48px; }
  .header { background: var(--color); color: white; width: 100%; max-width: 480px; border-radius: 20px; padding: 28px 24px 24px; text-align: center; margin-bottom: 20px; box-shadow: 0 8px 32px rgba(123,63,0,0.25); }
  .emoji { font-size: 56px; margin-bottom: 8px; }
  h1 { font-family: 'Fraunces', serif; font-size: 2.6rem; font-weight: 900; letter-spacing: -1px; }
  .subtitle { opacity: 0.85; font-size: 0.95rem; margin-top: 4px; }
  .rule-box { background: white; border-left: 5px solid var(--color); border-radius: 12px; padding: 16px 20px; width: 100%; max-width: 480px; margin-bottom: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .rule-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--color); font-weight: 500; margin-bottom: 6px; }
  .rule-text { font-size: 1rem; font-weight: 500; color: #1a1a1a; line-height: 1.5; }
  .items-card { background: white; border-radius: 16px; padding: 20px; width: 100%; max-width: 480px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .items-title { font-family: 'Fraunces', serif; font-size: 1.2rem; color: var(--color); margin-bottom: 14px; font-weight: 700; }
  .item { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.97rem; color: #222; }
  .item:last-child { border-bottom: none; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .tip { background: #fff8e1; border: 1.5px solid #ffe082; border-radius: 12px; padding: 14px 18px; width: 100%; max-width: 480px; margin-bottom: 14px; font-size: 0.9rem; color: #6d4c00; line-height: 1.5; }
  .tip strong { color: #b8860b; }
  .footer { margin-top: 20px; font-size: 0.78rem; color: #888; text-align: center; }
</style>
</head>
<body>
  <div class="header">
    <div class="emoji">🥫</div>
    <h1>Metal</h1>
    <div class="subtitle">What belongs in the metal bin?</div>
  </div>
  <div class="rule-box">
    <div class="rule-label">Important</div>
    <div class="rule-text">Emptied and scraped clean</div>
  </div>
  <div class="tip">
    <strong>Remember:</strong> Place metal loosely in the bin — not in a plastic bag.
  </div>
  <div class="items-card">
    <div class="items-title">Yes please</div>
    <div class="item"><div class="dot"></div>Cans</div>
    <div class="item"><div class="dot"></div>Foil trays</div>
    <div class="item"><div class="dot"></div>Drink cans (without deposit)</div>
    <div class="item"><div class="dot"></div>Tea light holders</div>
    <div class="item"><div class="dot"></div>Capsules and lids</div>
    <div class="item"><div class="dot"></div>Tin foil</div>
    <div class="item"><div class="dot"></div>Coffee capsules (without coffee)</div>
    <div class="item"><div class="dot"></div>Cutlery</div>
    <div class="item"><div class="dot"></div>Pots and pans</div>
  </div>
</body>
</html>
